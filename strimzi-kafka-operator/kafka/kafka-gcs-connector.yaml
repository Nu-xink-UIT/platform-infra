apiVersion: kafka.strimzi.io/v1
kind: KafkaConnector
metadata:
  name: gcs-raw-sink-connector
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-connect
spec:
  class: io.aiven.kafka.connect.gcs.GcsSinkConnector
  tasksMax: 4
  autoRestart:
    enabled: true
  config:
    file.name.template: >-
      kafka/{{topic}}/year={{timestamp:unit=yyyy}}/month={{timestamp:unit=MM}}/day={{timestamp:unit=dd}}/{{partition:padding=true}}-{{start_offset:padding=true}}.parquet
    file.name.timestamp.timezone: Asia/Ho_Chi_Minh

    # để tạo schema ảo cho parquet
    format.output.envelope: true
    format.output.fields: value
    format.output.type: parquet

    gcs.bucket.name: production-dp
    gcs.credentials.path: /opt/kafka/external-configuration/gcs-credentials/gcs-key.json

    key.converter: org.apache.kafka.connect.storage.StringConverter
    key.converter.schemas.enable: false


    value.converter: org.apache.kafka.connect.storage.StringConverter
    value.converter.schemas.enable: false

    topics: binance.raw, vcb_exchange_rates, goldprice.rates.raw, goldprice.raw, sjc.raw

    # transforms: "ProcessingTime, FormatTime"
    # transforms.ProcessingTime.timestamp.field: processing_time
    # transforms.ProcessingTime.type: org.apache.kafka.connect.transforms.InsertField$Value
    # transforms.FormatTime.field: processing_time
    # transforms.FormatTime.type: org.apache.kafka.connect.transforms.TimestampConverter$Value
    # transforms.FormatTime.target.type: unix
    # transforms.FormatTime.unix.precision: microseconds

    errors.tolerance: all
    errors.log.enable: true
    errors.deadletterqueue.context.headers.enable: true
    kafka.flush.messages: 10
    kafka.flush.timeout.ms: 5000